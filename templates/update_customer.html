<!DOCTYPE html>
<html>
<head>
{% load static %}
<title>Update Customer</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav>
<h2>🚜 Tractor Dealership System</h2>
</nav>

<div class="form-container">

<h1>Update Customer</h1>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="customer_name"
value="{{customer.customer_name}}">

<input
type="text"
name="phone"
value="{{customer.phone}}">

<textarea
name="address">{{customer.address}}</textarea>

<input
type="text"
name="village"
value="{{customer.village}}">

<button type="submit">
Update Customer
</button>

</form>

</div>

</body>
</html>
